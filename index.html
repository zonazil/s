<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Zonazil</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:white;font-family:'Segoe UI',sans-serif}
body{display:flex;align-items:center;justify-content:center}
.box{background:#111;border:1px solid #333;border-radius:16px;padding:48px 64px;text-align:center;width:90%;max-width:480px}
.logo{font-size:28px;font-weight:900;color:#0f0;margin-bottom:8px;letter-spacing:2px}
.sub{color:#666;font-size:14px;margin-bottom:40px}
.label{color:#888;font-size:13px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.senha{font-size:52px;font-weight:900;color:#0f0;letter-spacing:8px;background:#0a0a0a;border:2px solid #0f0;border-radius:10px;padding:20px 32px;margin-bottom:16px;font-family:monospace}
.val{color:#555;font-size:12px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">ZONAZIL</div>
  <div class="sub">Codigo de acesso ao software</div>
  <div class="label">Seu codigo e</div>
  <div class="senha" id="cod">...</div>
  <div class="val" id="timer"></div>
</div>
<script>
const CHAVE = "zonazil2025_";

async function sha256hex(texto) {
  const enc = new TextEncoder().encode(texto);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2,'0')).join('')
    .substring(0,8).toUpperCase();
}

async function atualizar() {
  const d = new Date();
  const ano  = d.getUTCFullYear();
  const mes  = String(d.getUTCMonth()+1).padStart(2,'0');
  const dia  = String(d.getUTCDate()).padStart(2,'0');
  const hora = String(d.getUTCHours()).padStart(2,'0');
  const bloco = Math.floor(d.getUTCMinutes()/5).toString();
  const senha = await sha256hex(CHAVE + ano + mes + dia + hora + bloco);
  document.getElementById('cod').textContent = senha;
  const seg = 300 - ((d.getUTCMinutes()%5)*60 + d.getUTCSeconds());
  const m = Math.floor(seg/60);
  const s = String(seg%60).padStart(2,'0');
  document.getElementById('timer').textContent = 'Expira em ' + m + ':' + s;
}

atualizar();
setInterval(atualizar, 1000);
</script>
</body>
</html>
